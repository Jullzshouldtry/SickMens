<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elemental Arena: Boss Targeting</title>
    <style>
        :root {
            --shadow: #00ecff;
            --forest: #1c4d3c;
            --bg: #050508;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); font-family: 'Consolas', monospace;
            overflow: hidden; color: white; touch-action: none;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { background: radial-gradient(circle, #0f0f1a 0%, #050508 100%); display: none; width: 100%; height: 100%; }

        #selection-screen {
            position: absolute; inset: 0; background: rgba(5, 5, 8, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px; }
        .char-card {
            padding: 20px; border: 2px solid #222; border-radius: 12px; cursor: pointer;
            text-align: center; width: 130px; background: rgba(255,255,255,0.03); transition: 0.3s;
        }
        .selected { border-color: white !important; background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        
        #hud {
            position: absolute; top: 15px; width: 96%; left: 2%; pointer-events: none;
            display: none; justify-content: space-between; z-index: 10;
        }
        .stat-box { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 8px; border: 1px solid #444; min-width: 160px; }
        .hp-bg { width: 100%; height: 6px; background: #111; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; transition: width 0.3s; }

        #announcer { position: absolute; top: 35%; width: 100%; text-align: center; font-weight: 900; display: none; z-index: 5; pointer-events: none; }

        #controls {
            position: absolute; bottom: 40px; width: 100%; display: none;
            justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 10;
        }
        .btn {
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: white; display: flex;
            justify-content: center; align-items: center; font-weight: bold; font-size: 11px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="selection-screen">
        <h1 style="color: var(--shadow); margin-bottom: 5px;">SQUAD ARENA</h1>
        <p style="opacity: 0.6; margin-bottom: 25px;">The Boss now tracks your every move.</p>
        <div class="char-grid" id="hero-list"></div>
        <button id="start-btn" style="padding: 18px 70px; border-radius: 35px; border:none; background: #fff; color: #000; font-weight: 900; cursor: pointer; margin-top: 20px;">DEPLOY SQUAD</button>
    </div>

    <div id="hud">
        <div id="p-hud" class="stat-box"></div>
        <div id="wave-info" style="text-align: center;">
            <div id="wave-display" style="font-size: 1.5rem; font-weight: 900;">WAVE 1</div>
        </div>
        <div id="ally-hud-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div id="announcer"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div style="display:flex; gap:15px;"><div class="btn" id="l-ctrl">LEFT</div><div class="btn" id="r-ctrl">RIGHT</div></div>
        <div style="display:flex; gap:15px;"><div class="btn" id="j-ctrl">JUMP</div><div class="btn" id="a-ctrl">ATTACK</div></div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const announcer = document.getElementById('announcer');

let w, h, player, entities = [], projectiles = [], particles = [], platforms = [], shake = 0;
let wave = 1, spawned = 0, targetSpawn = 0, active = false;

const BOT_NAMES = ["CADE", "WESLEY", "ACE"];
const HERO_DATA = {
    'shadow': { name: 'Shadow', color: '#00ecff', hp: 350, speed: 5, cd: 25 },
    'vex': { name: 'Vex', color: '#ff4757', hp: 500, speed: 3.2, cd: 40 },
    'kiro': { name: 'Kiro', color: '#eccc68', hp: 280, speed: 6.8, cd: 15 },
    'volt': { name: 'Volt', color: '#a55eea', hp: 320, speed: 4.5, cd: 22 }
};

let selectedHeroKey = 'shadow';
const heroKeys = Object.keys(HERO_DATA);
const grid = document.getElementById('hero-list');

heroKeys.forEach(k => {
    const card = document.createElement('div');
    card.className = `char-card ${k === 'shadow' ? 'selected' : ''}`;
    card.style.borderColor = HERO_DATA[k].color;
    card.innerHTML = `<b style="color:${HERO_DATA[k].color}">${HERO_DATA[k].name.toUpperCase()}</b>`;
    card.onclick = () => {
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedHeroKey = k;
    };
    grid.appendChild(card);
});

class Platform {
    constructor(x, y, width) {
        this.x = x; this.y = y; this.width = width; this.height = 12;
    }
    draw() {
        ctx.fillStyle = '#1c4d3c';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.strokeRect(this.x, this.y, this.width, this.height);
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random()-0.5) * 10; this.vy = (Math.random()-0.5) * 10;
        this.life = 1.0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.04; }
    draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 3, 3); ctx.globalAlpha = 1; }
}

class Orb {
    constructor(x, y, vx, vy, color, team, dmg = 45, size = 7) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.team = team;
        this.active = true; this.dmg = dmg; this.size = size;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        entities.forEach(e => {
            if(e.team !== this.team && e.hp > 0 && Math.abs(e.x - this.x) < 30 * e.scale && Math.abs((e.y-40*e.scale) - this.y) < 50 * e.scale) {
                e.hp -= this.dmg; this.active = false; shake = 10;
                for(let i=0; i<8; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
        });
        if(this.x < -500 || this.x > w + 500 || this.y < -500 || this.y > h + 500) this.active = false;
    }
    draw() { 
        ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Fighter {
    constructor(x, y, id, team, customName = null) {
        let d;
        if(team === 'player') d = {...HERO_DATA[id]};
        else if(id === 'boss') d = { name: 'ABYSS LORD', color: '#ff9f43', hp: 3000, speed: 2.2, cd: 55 };
        else d = { name: 'Wraith', color: '#ff00ff', hp: 120, speed: 3, cd: 85 };
        
        this.id = id; 
        this.name = customName || d.name;
        this.color = d.color; 
        this.team = team;
        this.scale = (id === 'boss') ? 3.5 : 1;
        
        const scaleFactor = 1 + (wave * 0.08);
        this.maxHp = team === 'enemy' ? d.hp * scaleFactor : d.hp;
        this.hp = this.maxHp;
        this.speed = team === 'enemy' ? d.speed * (1 + wave * 0.02) : d.speed;
        this.cdMax = d.cd; 
        this.cd = 0;
        this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.dir = 1;
        this.respawnTimer = 0;
        this.onGround = false;
    }
    draw() {
        if(this.respawnTimer > 0) ctx.globalAlpha = 0.2;
        ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale);
        ctx.strokeStyle = this.color; ctx.lineWidth = (this.id === 'boss') ? 6 : 4;
        ctx.beginPath(); ctx.arc(0, -60, 12, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -48); ctx.lineTo(0, -10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(20*this.dir, -40); ctx.stroke();
        ctx.restore();
        ctx.globalAlpha = 1;
    }
    update() {
        if(this.hp <= 0) {
            if(this.team === 'player') {
                if(this.respawnTimer === 0) this.respawnTimer = 300; 
                this.respawnTimer--;
                if(this.respawnTimer <= 0) { this.hp = this.maxHp; this.x = w/2; this.y = h-100; }
            }
            return;
        }

        this.x += this.vx; this.y += this.vy;
        this.vy += 0.85; 
        this.onGround = false;

        if(this.y >= h-100) { this.y = h-100; this.vy = 0; this.onGround = true; }

        platforms.forEach(p => {
            if(this.vy >= 0 && this.y <= p.y + 5 && this.y >= p.y - 5 && this.x > p.x && this.x < p.x + p.width) {
                this.y = p.y; this.vy = 0; this.onGround = true;
            }
        });

        this.vx *= 0.85; 
        if(this.cd > 0) this.cd--;
        
        if(this.team === 'enemy') {
            let targets = entities.filter(e => e.team === 'player' && e.hp > 0);
            if(targets.length > 0) {
                let closest = targets.reduce((p, c) => Math.abs(c.x - this.x) < Math.abs(p.x - this.x) ? c : p);
                this.aiLogic(closest);
            }
        } else if(this !== player) {
            this.botBrain();
        }
    }

    aiLogic(target) {
        this.dir = target.x > this.x ? 1 : -1;
        if(Math.abs(target.x - this.x) > 150) this.vx = this.dir * this.speed;
        if(target.y < this.y - 80 && this.onGround && Math.random() < 0.03) this.vy = -18;
        
        if(this.cd <= 0) this.cast(target);
    }

    botBrain() {
        let enemies = entities.filter(e => e.team === 'enemy' && e.hp > 0);
        if(enemies.length > 0) {
            let target = enemies.reduce((p, c) => Math.abs(c.x - this.x) < Math.abs(p.x - this.x) ? c : p);
            this.aiLogic(target);
        } else {
            if(Math.abs(player.x - this.x) > 150) {
                this.vx = (player.x > this.x ? 1 : -1) * 2.5;
                this.dir = player.x > this.x ? 1 : -1;
            }
            if(player.y < this.y - 150 && this.onGround && Math.random() < 0.01) this.vy = -18;
        }
    }

    cast(target = null) {
        if(this.cd > 0 || this.hp <= 0) return;
        this.cd = this.cdMax;

        let startX = this.x + (25 * this.dir);
        let startY = (this.id === 'boss') ? this.y - 180 : this.y - 45;
        
        let pVx, pVy;
        const pSpeed = (this.team === 'enemy') ? 9 + (wave * 0.2) : 16;

        if(this.id === 'boss' && target) {
            // Target tracking logic for Boss
            let targetY = target.y - (40 * target.scale);
            let angle = Math.atan2(targetY - startY, target.x - startX);
            pVx = Math.cos(angle) * pSpeed;
            pVy = Math.sin(angle) * pSpeed;
        } else {
            // Normal horizontal shot
            pVx = this.dir * pSpeed;
            pVy = 0;
        }

        projectiles.push(new Orb(startX, startY, pVx, pVy, this.color, this.team, this.id === 'boss' ? 85 : 45, this.id === 'boss' ? 22 : 7));
    }
}

function startWave() {
    spawned = 0; platforms = [];
    const isBoss = wave % 5 === 0;
    targetSpawn = isBoss ? 1 : 3 + Math.floor(wave * 1.5);
    
    platforms.push(new Platform(w * 0.1, h - 250, 250));
    platforms.push(new Platform(w * 0.6, h - 250, 250));
    platforms.push(new Platform(w * 0.35, h - 450, 300));

    announcer.style.display = 'block';
    announcer.innerHTML = `<h1 style="color:${isBoss ? '#ff9f43' : '#fff'}">WAVE ${wave}${isBoss ? '<br>BOSS TRACKING ACTIVE' : ''}</h1>`;
    document.getElementById('wave-display').innerText = `WAVE ${wave}`;
    setTimeout(() => announcer.style.display = 'none', 2500);
}

function loop() {
    if(!active) return;
    ctx.clearRect(0, 0, w, h); ctx.save();
    if(shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
    
    ctx.fillStyle = '#1c4d3c'; ctx.fillRect(0, h-100, w, 100); 
    platforms.forEach(p => p.draw());

    if(spawned < targetSpawn && Math.random() < 0.015) {
        let id = (wave % 5 === 0) ? 'boss' : 'corrupt';
        entities.push(new Fighter(Math.random() < 0.5 ? -100 : w+100, h-100, id, 'enemy'));
        spawned++;
    } 

    if(entities.filter(e => e.team === 'enemy' && e.hp > 0).length === 0 && spawned >= targetSpawn) {
        wave++; startWave();
    }

    projectiles = projectiles.filter(p => p.active); 
    projectiles.forEach(p => { p.update(); p.draw(); });
    particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i, 1); });

    entities = entities.filter(e => e.team === 'player' || e.hp > 0);
    entities.forEach(e => { e.update(); e.draw(); });

    const getHudHtml = (f) => `
        <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
            <b>${f.name}</b> <small>${f.hp > 0 ? Math.ceil(f.hp) : 'KO'}</small>
        </div>
        <div class="hp-bg"><div class="hp-fill" style="background:${f.color}; width:${Math.max(0,(f.hp/f.maxHp)*100)}%"></div></div>`;
    
    document.getElementById('p-hud').innerHTML = getHudHtml(player);
    let allyHud = "";
    entities.filter(e => e.team === 'player' && e !== player).forEach(a => {
        allyHud += `<div class="stat-box" style="margin-bottom:6px;">${getHudHtml(a)}</div>`;
    });
    document.getElementById('ally-hud-container').innerHTML = allyHud;

    ctx.restore();
    if(player.hp > 0) requestAnimationFrame(loop);
    else { alert("MISSION FAILED - WAVE: " + wave); location.reload(); }
}

document.getElementById('start-btn').onclick = () => {
    w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h;
    document.getElementById('selection-screen').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    
    player = new Fighter(w/2, h-100, selectedHeroKey, 'player', "JULLIAN (LEADER)");
    entities = [player];
    let availableKeys = heroKeys.filter(k => k !== selectedHeroKey);
    BOT_NAMES.forEach((name, i) => entities.push(new Fighter(w/2 + (Math.random()*400 - 200), h-100, availableKeys[i], 'player', name)));

    active = true; startWave(); loop();
};

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

setInterval(() => {
    if(!player || !active || player.hp <= 0) return;
    if(keys['ArrowLeft'] || keys['KeyA']) { player.vx = -player.speed; player.dir = -1; }
    if(keys['ArrowRight'] || keys['KeyD']) { player.vx = player.speed; player.dir = 1; }
    if((keys['ArrowUp'] || keys['KeyW']) && player.onGround) player.vy = -19;
    if(keys['Space']) player.cast();
}, 1000/60);

const ctrl = (id, fn) => document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
ctrl('l-ctrl', () => { player.vx = -player.speed; player.dir = -1; });
ctrl('r-ctrl', () => { player.vx = player.speed; player.dir = 1; });
ctrl('j-ctrl', () => { if(player.onGround) player.vy = -19; });
ctrl('a-ctrl', () => player.cast());
</script>
</body>
</html>
